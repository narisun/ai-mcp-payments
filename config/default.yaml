environment: dev
service_name: payments-mcp
agent_role: data_analyst_agent
transport: sse
port: 8082

opa_url: http://opa:8181/v1/data/mcp/tools/allow
opa_timeout_seconds: 2.0

max_result_bytes: 15000
enable_tool_cache: true
tool_cache_ttl_seconds: 300

# Redis cache backend
redis_host: redis
redis_port: 6379
redis_password: ${REDIS_PASSWORD}

# PostgreSQL database — connects to the shared pgvector container.
# Service-specific schema isolation is handled by table prefixes,
# not by separate Postgres databases or roles.
db_host: pgvector
db_port: 5432
db_name: ai_memory
db_user: admin
db_pass: ${DB_PASS}

registry_url: http://ai-registry:8090
service_url: http://payments-mcp:8082
service_version: "0.6.0"
internal_api_key: ${INTERNAL_API_KEY}
